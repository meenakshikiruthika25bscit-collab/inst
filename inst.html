<html lang="en">
<head>

    <title>Redirecting...</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;

            background-color: #fafafa;
        }

<body>

        <h2>Redirecting to Instagram...</h2>

        window.location.href = "https://www.instagram.com/";
    </script>

</html>
